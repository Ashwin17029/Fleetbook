<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F1A2B">
<title>Fleetbook</title>
<style>
  :root{
    --ink:#0F1A2B;        /* deep navy */
    --ink-2:#1B2A41;
    --panel:#F7F5EF;      /* warm paper */
    --panel-2:#FFFFFF;
    --line:#DAD5C8;
    --amber:#E8A317;      /* taxi amber */
    --amber-deep:#C8860B;
    --green:#1E7F5C;
    --red:#B23A3A;
    --muted:#6B7585;
    --shadow:0 2px 0 rgba(15,26,43,.04), 0 8px 24px rgba(15,26,43,.08);
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--ink);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .app{max-width:760px;margin:0 auto;background:var(--panel);min-height:100vh;
       box-shadow:0 0 60px rgba(0,0,0,.35);}
  /* Header */
  header{
    background:var(--ink);color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 20px 16px;
    position:sticky;top:0;z-index:30;
    border-bottom:3px solid var(--amber);
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .logo{
    width:34px;height:34px;border-radius:8px;background:
      repeating-linear-gradient(45deg,var(--amber) 0 7px,var(--ink) 7px 14px);
    border:2px solid var(--amber);flex:none;
  }
  .brand h1{font-size:20px;margin:0;letter-spacing:.5px;font-weight:800;}
  .brand small{display:block;color:var(--amber);font-size:11px;letter-spacing:2px;
    text-transform:uppercase;font-weight:700;margin-top:1px;}
  /* Tabs */
  nav{display:flex;background:var(--ink-2);position:sticky;
    top:calc(env(safe-area-inset-top) + 70px);z-index:29;overflow-x:auto;
    scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  nav button{
    flex:1 0 auto;background:none;border:none;color:#A9B4C4;font-size:12.5px;
    font-weight:700;padding:13px 16px;letter-spacing:.4px;cursor:pointer;
    border-bottom:3px solid transparent;white-space:nowrap;text-transform:uppercase;
  }
  nav button.active{color:#fff;border-bottom-color:var(--amber);}
  main{padding:18px 16px 90px;}
  h2.section{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);margin:4px 0 14px;font-weight:800;}
  /* Cards */
  .card{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow);margin-bottom:13px;}
  .card.click{cursor:pointer;transition:transform .08s;}
  .card.click:active{transform:scale(.99);}
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:6px;}
  .stat{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 15px;box-shadow:var(--shadow);}
  .stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    font-weight:700;}
  .stat .val{font-size:25px;font-weight:800;margin-top:5px;letter-spacing:-.5px;}
  .val.green{color:var(--green);} .val.red{color:var(--red);}
  .pill{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;
    letter-spacing:.4px;text-transform:uppercase;}
  .pill.ok{background:#E1F0E9;color:var(--green);}
  .pill.warn{background:#FBEED0;color:var(--amber-deep);}
  .pill.bad{background:#F6E0E0;color:var(--red);}
  .pill.cat{background:var(--ink);color:#fff;font-weight:700;text-transform:none;}
  .car-title{font-size:17px;font-weight:800;}
  .sub{color:var(--muted);font-size:13px;margin-top:3px;line-height:1.5;}
  .money{font-weight:800;font-size:16px;}
  .money.in{color:var(--green);} .money.out{color:var(--red);}
  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    background:var(--amber);color:var(--ink);border:none;border-radius:11px;
    font-weight:800;font-size:15px;padding:13px 18px;cursor:pointer;letter-spacing:.3px;
    box-shadow:0 2px 0 var(--amber-deep);width:100%;}
  .btn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--amber-deep);}
  .btn.dark{background:var(--ink);color:#fff;box-shadow:0 2px 0 #000;}
  .btn.ghost{background:none;color:var(--ink);border:1.5px solid var(--line);box-shadow:none;}
  .btn.danger{background:var(--red);color:#fff;box-shadow:0 2px 0 #7d2727;}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;}
  .fab{position:fixed;right:max(16px,calc(50% - 380px + 16px));
    bottom:calc(20px + env(safe-area-inset-bottom));width:58px;height:58px;border-radius:50%;
    background:var(--amber);color:var(--ink);border:none;font-size:30px;font-weight:300;
    box-shadow:0 6px 18px rgba(232,163,23,.5);z-index:40;cursor:pointer;line-height:1;}
  /* Forms */
  label.f{display:block;font-size:12px;font-weight:700;text-transform:uppercase;
    letter-spacing:.6px;color:var(--muted);margin:14px 0 6px;}
  input,select,textarea{width:100%;font-size:16px;font-family:inherit;color:var(--ink);
    background:var(--panel-2);border:1.5px solid var(--line);border-radius:10px;
    padding:12px 13px;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--amber);}
  textarea{resize:vertical;min-height:60px;}
  .seg{display:flex;gap:0;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{flex:1;background:var(--panel-2);border:none;padding:11px;font-weight:700;
    font-size:14px;cursor:pointer;color:var(--muted);}
  .seg button.on{background:var(--ink);color:#fff;}
  .seg.in button.on{background:var(--green);}
  .seg.out button.on{background:var(--red);}
  /* Modal */
  .scrim{position:fixed;inset:0;background:rgba(15,26,43,.55);z-index:50;display:none;
    align-items:flex-end;justify-content:center;}
  .scrim.show{display:flex;}
  .sheet{background:var(--panel);width:100%;max-width:760px;border-radius:20px 20px 0 0;
    max-height:92vh;overflow-y:auto;padding:8px 18px calc(28px + env(safe-area-inset-bottom));
    animation:rise .22s ease;}
  @keyframes rise{from{transform:translateY(40px);opacity:.4;}to{transform:none;opacity:1;}}
  .grab{width:42px;height:5px;background:var(--line);border-radius:5px;margin:8px auto 6px;}
  .sheet h3{font-size:20px;margin:6px 0 4px;font-weight:800;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .btn{flex:1;}
  /* Receipt */
  .receipt-thumb{width:100%;border-radius:10px;border:1px solid var(--line);margin-top:8px;
    display:block;}
  .att{display:flex;align-items:center;gap:10px;background:#EEF6F1;border:1px dashed var(--green);
    border-radius:10px;padding:9px 12px;margin-top:8px;font-size:13px;color:var(--green);
    font-weight:700;}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;}
  .empty .big{font-size:42px;margin-bottom:8px;}
  .divlabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;
    font-weight:800;margin:22px 2px 10px;}
  .filterbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .filterbar select{width:auto;flex:1;min-width:120px;padding:9px 11px;font-size:14px;}
  .barwrap{margin:6px 0 2px;}
  .bar{height:9px;border-radius:5px;background:var(--line);overflow:hidden;}
  .bar > span{display:block;height:100%;border-radius:5px;}
  table.rep{width:100%;border-collapse:collapse;font-size:14px;}
  table.rep td{padding:9px 4px;border-bottom:1px solid var(--line);}
  table.rep td:last-child{text-align:right;font-weight:700;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:var(--ink);
    color:#fff;padding:12px 20px;border-radius:30px;font-weight:700;font-size:14px;z-index:80;
    box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:opacity .2s,transform .2s;
    pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .hint{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:6px;}
  .dropdot{width:9px;height:9px;border-radius:50%;flex:none;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:11px">
        <div class="logo"></div>
        <div>
          <h1>Fleetbook</h1>
          <small>Taxi Fleet Manager</small>
        </div>
      </div>
      <button onclick="backup()" title="Back up now" style="background:rgba(255,255,255,.12);border:1.5px solid var(--amber);color:#fff;border-radius:10px;font-weight:800;font-size:12px;padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:.3px">⤓ Back up</button>
    </div>
  </header>
  <nav id="tabs">
    <button data-tab="dash" class="active">Dashboard</button>
    <button data-tab="fleet">Taxis</button>
    <button data-tab="income">Income</button>
    <button data-tab="expenses">Expenses</button>
    <button data-tab="parts">Maintenance</button>
    <button data-tab="incidents">Incidents</button>
    <button data-tab="reminders">Reminders</button>
    <button data-tab="reports">Reports</button>
  </nav>
  <main id="view"></main>
</div>

<button class="fab" id="fab" title="Add">+</button>
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

let db=JSON.parse(JSON.stringify(blank)); // populated by bootStorage() before first render

// --- IndexedDB tiny wrapper ---
let _idb=null;
function idbOpen(){return new Promise((res,rej)=>{
  const r=indexedDB.open('fleetbook',1);
  r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});}
function idbGet(key){return new Promise((res,rej)=>{const tx=_idb.transaction('kv','readonly');
  const rq=tx.objectStore('kv').get(key);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error);});}
function idbSet(key,val){return new Promise((res,rej)=>{const tx=_idb.transaction('kv','readwrite');
  const rq=tx.objectStore('kv').put(val,key);rq.onsuccess=()=>res(true);rq.onerror=()=>rej(rq.error);});}

let _saveTimer=null,_saveErrShown=false;
function save(){
  // memory is the source of truth and stays synchronous for the rest of the app
  // persist to IndexedDB (debounced) so rapid edits don't thrash
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    if(_idb){ idbSet(DB_KEY,db).then(()=>{_saveErrShown=false;}).catch(e=>{
      if(!_saveErrShown){_saveErrShown=true;toast('Could not save — device storage may be full');}
    }); }
  },150);
  const n=(parseInt(localStorage.getItem('fb_changesSinceBackup'))||0)+1;
  localStorage.setItem('fb_changesSinceBackup',n);
  maybeBackupPrompt(n);
}
async function bootStorage(){
  try{ _idb=await idbOpen(); }catch(e){ _idb=null; }
  let loaded=null;
  if(_idb){ try{ loaded=await idbGet(DB_KEY); }catch(e){} }
  // Migrate from old localStorage copy if present and IndexedDB empty
  if(!loaded){
    try{ const old=localStorage.getItem(DB_KEY); if(old){ loaded=JSON.parse(old); if(_idb)await idbSet(DB_KEY,loaded); } }catch(e){}
  }
  // Otherwise seed the built-in data (first run on this device)
  if(!loaded && typeof SEED!=='undefined'){
    loaded=SEED;
    if(_idb){ try{ await idbSet(DB_KEY,loaded); }catch(e){} }
  }
  db=Object.assign({},JSON.parse(JSON.stringify(blank)),loaded||{});
}
let _backupPromptShown=false;
function maybeBackupPrompt(n){
  if(_backupPromptShown)return;
  if(n>=8){
    _backupPromptShown=true;
    setTimeout(()=>{
      if(confirm("You've added a lot of records. Back them up to iCloud or email now so they're safe?")){backup();}
    },400);
  }
}

const PARTS=['Tyre','Brake pads','Brake discs','Battery','Engine oil','Oil filter','Air filter','Fuel filter','Spark plugs','Clutch','Timing belt','Alternator','Starter motor','Radiator','Water pump','Shock absorber','Wiper blades','Headlight','Windscreen','Exhaust','Other'];
const CAT_COLOR={Fuel:'#E8A317',Maintenance:'#1B6FB2',Insurance:'#7A4FB5',Registration:'#1E7F5C',Tyres:'#5A5A5A',Cleaning:'#2BA3A3',Fines:'#B23A3A',Permits:'#C8860B',Salaries:'#9B5B2E',Other:'#6B7585'};

/* ---------- Helpers ---------- */
let CUR=localStorage.getItem('fb_cur')||'$';
const money=n=>CUR+(Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=d=>{if(!d)return'—';const t=new Date(d+'T00:00');return t.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'});};
function daysTo(d){if(!d)return null;return Math.ceil((new Date(d+'T00:00')-new Date(today()+'T00:00'))/864e5);}
function expiryPill(d){const n=daysTo(d);if(n===null)return'<span class="pill warn">No date</span>';
  if(n<0)return `<span class="pill bad">Expired ${-n}d</span>`;
  if(n<=30)return `<span class="pill warn">${n}d left</span>`;
  return `<span class="pill ok">${n}d left</span>`;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}
function taxiName(id){const t=db.taxis.find(x=>x.id===id);return t?t.plate:'(deleted)';}
function within(d,range){if(range==='all')return true;const n=daysTo(d);/*d in past => negative*/const ago=-n;
  if(range==='day')return ago>=0&&ago<1;if(range==='week')return ago>=0&&ago<7;if(range==='month')return ago>=0&&ago<31;if(range==='year')return ago>=0&&ago<366;return true;}

let TAB='dash';
function syncTabs(){[...document.getElementById('tabs').children].forEach(c=>c.classList.toggle('active',c.dataset.tab===TAB));}
document.getElementById('tabs').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  TAB=b.dataset.tab;syncTabs();render();});
function render(){({dash:vDash,fleet:vFleet,income:vIncome,expenses:vExpenses,parts:vParts,incidents:vIncidents,reminders:vReminders,reports:vReports})[TAB]();

  });
  alerts.sort((a,b)=>a.n-b.n);
  // Backup nudge
  const records=db.taxis.length+db.income.length+db.expenses.length+db.parts.length+(db.incidents||[]).length;
  const last=parseInt(localStorage.getItem('fb_lastBackup'))||0;
  const daysSince=last?Math.floor((Date.now()-last)/864e5):null;
  let nudge='';

      <button class="btn sm" style="margin-top:12px" onclick="backup()">Export backup now</button></div>`;
    else if(daysSince>=7)nudge=`<div class="card" style="border-color:var(--amber);background:#FCF3DD">

  else alerts.slice(0,8).forEach(a=>{h+=`<div class="card"><div class="row">
    <div><div class="car-title">${a.plate}</div><div class="sub">${a.k} · ${fmtD(a.d)}</div></div>

  // Storage usage meter (IndexedDB has far more room than before)
  const usedBytes=JSON.stringify(db).length;
  h+=`<div class="divlabel">Storage</div><div class="card">
    <div class="row" style="margin-bottom:4px"><div class="sub" style="margin:0;color:var(--ink);font-weight:700">${(usedBytes/1048576).toFixed(1)} MB of data stored</div></div>

  </div>`;
  // async refine with real quota estimate if available
  if(navigator.storage&&navigator.storage.estimate){
    navigator.storage.estimate().then(e=>{
      const el=document.getElementById('storeHint');if(!el)return;
      const usedMB=(e.usage/1048576).toFixed(0), quotaMB=(e.quota/1048576).toFixed(0);
      el.innerHTML=`Using about ${usedMB} MB of an estimated ${quotaMB} MB available on this device. Plenty of room for receipts. Export a backup regularly so a lost phone never means lost records.`;
    }).catch(()=>{});
  }
  h+=`<div class="divlabel">Settings</div><div class="card">
    <label class="f">Currency symbol</label>
    <input id="curIn" value="${CUR}" maxlength="4" style="max-width:120px">

    </div>
    <input type="file" id="imp" accept="application/json" style="display:none" onchange="restore(this)">
  </div>`;
  document.getElementById('view').innerHTML=h;
  document.getElementById('curIn').onchange=e=>{CUR=e.target.value||'$';localStorage.setItem('fb_cur',CUR);render();};

function saveTaxi(id){
  const g=k=>document.getElementById(k).value.trim();
  if(!g('plate')){toast('Number plate is required');return;}
  const rec={id:id||uid(),plate:g('plate'),make:g('make'),model:g('model'),year:g('year'),

    driver:g('driver'),driverPhone:g('driverPhone'),driverId:g('driverId'),
    driverLic:g('driverLic'),driverLicExpiry:g('driverLicExpiry'),

    driverHistory:(id?(db.taxis.find(x=>x.id===id).driverHistory||[]):[])};
  if(id){const i=db.taxis.findIndex(x=>x.id===id);db.taxis[i]=rec;}else db.taxis.push(rec);
  try{save();}catch(e){toast('Storage full — try a smaller contract file');return;}
  closeSheet();render();toast(id?'Taxi updated':'Taxi added');

let pendingContract=null,pendingContractName='';
function attachContract(inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>4.5*1024*1024){toast('File too large — keep under 4MB');inp.value='';return;}
  pendingContractName=f.name;
  if(f.type.startsWith('image/')){
    const reader=new FileReader();
    reader.onload=()=>{const img=new Image();img.onload=()=>{
      const max=900,sc=Math.min(1,max/Math.max(img.width,img.height));
      const c=document.createElement('canvas');c.width=img.width*sc;c.height=img.height*sc;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      pendingContract=c.toDataURL('image/jpeg',0.5);
      document.getElementById('contractPrev').innerHTML=`<img class="receipt-thumb" src="${pendingContract}">`;
    };img.src=reader.result;};reader.readAsDataURL(f);
  }else{const reader=new FileReader();reader.onload=()=>{pendingContract=reader.result;
    document.getElementById('contractPrev').innerHTML=`<div class="att">📄 ${pendingContractName}</div>`;};reader.readAsDataURL(f);}
}
function openContract(id){const t=db.taxis.find(x=>x.id===id);if(!t||!t.contract)return;openData(t.contract);}
function openData(d){if(!d)return;const w=window.open('');
  if(typeof d==='string'&&d.startsWith('data:application/pdf'))w.document.write(`<iframe src="${d}" style="border:0;width:100%;height:100vh"></iframe>`);
  else w.document.write(`<img src="${d}" style="max-width:100%">`);}
function previewHTML(data,clearExpr,label){
  if(!data)return '';

  const view=isDoc?`<div class="att">📄 Document attached</div>`:`<img class="receipt-thumb" src="${data}">`;
  return `${view}<button class="btn ghost sm" style="margin-top:8px" onclick="${clearExpr}">Remove ${label}</button>`;}

function attachReceipt(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  if(f.type.startsWith('image/')){
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=900,sc=Math.min(1,max/Math.max(img.width,img.height));
        const c=document.createElement('canvas');c.width=img.width*sc;c.height=img.height*sc;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        pendingReceipt=c.toDataURL('image/jpeg',0.5);
        document.getElementById('rcptPrev').innerHTML=`<img class="receipt-thumb" src="${pendingReceipt}"><button class="btn ghost sm" style="margin-top:8px" onclick="pendingReceipt=null;document.getElementById('rcptPrev').innerHTML='';">Remove receipt</button>`;
      };img.src=reader.result;
    };reader.readAsDataURL(f);
  }else{
    if(f.size>4.5*1024*1024){toast('File too large — keep under 4MB');inp.value='';return;}
    reader.onload=()=>{pendingReceipt=reader.result;
      document.getElementById('rcptPrev').innerHTML=`<div class="att">📄 ${f.name}</div><button class="btn ghost sm" style="margin-top:8px" onclick="pendingReceipt=null;document.getElementById('rcptPrev').innerHTML='';">Remove file</button>`;
    };reader.readAsDataURL(f);
  }
}

function renderIncThumbs(){
  const box=document.getElementById('iphotoPrev');if(!box)return;
  box.innerHTML=pendingIncPhotos.map((p,i)=>{
    const isDoc=typeof p==='string'&&p.startsWith('data:application/pdf');
    const inner=isDoc
      ? `<div style="width:80px;height:80px;border-radius:8px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;background:#f4f1ea;font-size:11px;font-weight:800;color:var(--muted);text-align:center">PDF</div>`
      : `<img src="${p}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">`;
    return `<div style="position:relative">${inner}
    <button onclick="pendingIncPhotos.splice(${i},1);renderIncThumbs()" style="position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;border:none;background:var(--red);color:#fff;font-weight:800;cursor:pointer">×</button>
  </div>`;}).join('');
}
function attachIncPhotos(inp){
  const files=[...inp.files];let done=0;
  const finish=()=>{if(++done===files.length)renderIncThumbs();else renderIncThumbs();};
  files.forEach(f=>{const reader=new FileReader();
    if(f.type.startsWith('image/')){
      reader.onload=()=>{const img=new Image();img.onload=()=>{
        const max=900,sc=Math.min(1,max/Math.max(img.width,img.height));
        const c=document.createElement('canvas');c.width=img.width*sc;c.height=img.height*sc;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        pendingIncPhotos.push(c.toDataURL('image/jpeg',0.5));finish();
      };img.src=reader.result;};reader.readAsDataURL(f);
    }else{
      if(f.size>4.5*1024*1024){toast(f.name+' too large (max 4MB)');finish();return;}
      reader.onload=()=>{pendingIncPhotos.push(reader.result);finish();};reader.readAsDataURL(f);
    }
  });
  inp.value='';
}

  if(id){const i=db.incidents.findIndex(x=>x.id===id);db.incidents[i]=rec;}else db.incidents.push(rec);
  try{save();}catch(e){toast('Storage full — remove some photos');return;}
  closeSheet();vIncidents();toast('Incident saved');
}
function delIncident(id){if(!confirm('Delete this incident record?'))return;
  db.incidents=db.incidents.filter(x=>x.id!==id);save();closeSheet();vIncidents();toast('Deleted');}

/* ---------- Reminders ---------- */
function collectExpiries(){
  const items=[];
  db.taxis.forEach(t=>{
    [['Registration',t.regExpiry],['Insurance',t.insExpiry],['Road licence',t.licExpiry],['Driver licence',t.driverLicExpiry]]
      .forEach(([k,d])=>{if(d)items.push({plate:t.plate,k,d,n:daysTo(d)});});
  });
  return items.sort((a,b)=>a.n-b.n);
}
function vReminders(){
  const items=collectExpiries();
  const overdue=items.filter(i=>i.n<0);
  const soon=items.filter(i=>i.n>=0&&i.n<=30);
  const later=items.filter(i=>i.n>30);
  let h=`<h2 class="section">Reminders</h2>
  <div class="card"><div class="sub" style="margin:0">Every document expiry date you enter shows up here, sorted by what's due first. Add them all to your phone's calendar so you get alerts automatically — even when the app is closed.</div>
  <button class="btn dark" style="margin-top:14px" onclick="exportICS()">🔔 Add all expiries to calendar</button>
  <div class="hint">Downloads a calendar file. On iPhone tap it → Add All; it creates events with reminders 30 days and 7 days before each expiry.</div></div>`;
  const block=(title,arr)=>{if(!arr.length)return'';let s=`<div class="divlabel">${title}</div>`;
    arr.forEach(i=>{s+=`<div class="card"><div class="row"><div><div class="car-title">${i.plate}</div>
      <div class="sub">${i.k} · ${fmtD(i.d)}</div></div>${expiryPill(i.d)}</div></div>`;});return s;};
  if(!items.length)h+=`<div class="empty"><div class="big">🔔</div>No expiry dates entered yet.<br>Add them on each taxi to track them here.</div>`;
  h+=block('Overdue',overdue)+block('Due within 30 days',soon)+block('Upcoming',later);
  document.getElementById('view').innerHTML=h;
}
function exportICS(){
  const items=collectExpiries();
  if(!items.length){toast('No expiry dates to export');return;}
  const stamp=d=>d.replace(/-/g,'');
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Fleetbook//EN\r\nCALSCALE:GREGORIAN\r\n';
  items.forEach(i=>{
    ics+='BEGIN:VEVENT\r\n'+`UID:${uid()}@fleetbook\r\n`+`DTSTART;VALUE=DATE:${stamp(i.d)}\r\n`+
      `SUMMARY:${i.plate} — ${i.k} expires\r\n`+`DESCRIPTION:Renew ${i.k} for taxi ${i.plate}.\r\n`+
      'BEGIN:VALARM\r\nTRIGGER:-P30D\r\nACTION:DISPLAY\r\nDESCRIPTION:Expiry in 30 days\r\nEND:VALARM\r\n'+
      'BEGIN:VALARM\r\nTRIGGER:-P7D\r\nACTION:DISPLAY\r\nDESCRIPTION:Expiry in 7 days\r\nEND:VALARM\r\n'+
      'END:VEVENT\r\n';
  });
  ics+='END:VCALENDAR';
  dl('fleetbook-expiries.ics',ics,'text/calendar');
  toast('Calendar file downloaded');
}

/* ---------- Reports ---------- */
let repPeriod='month',repTaxi='all';
function vReports(){
  const inc=db.income.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi));
  const exp=db.expenses.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi));
  const prt=db.parts.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi));
  const totIn=inc.reduce((s,r)=>s+ +r.amount,0);
  const totEx=exp.reduce((s,r)=>s+ +r.amount,0)+prt.reduce((s,r)=>s+ +r.amount,0);
  const byCat={};exp.forEach(r=>byCat[r.category]=(byCat[r.category]||0)+ +r.amount);
  prt.forEach(r=>byCat['Parts & maintenance']=(byCat['Parts & maintenance']||0)+ +r.amount);
  const catArr=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const maxCat=catArr.length?catArr[0][1]:1;
  let h=`<h2 class="section">Reports</h2>
  <div class="filterbar">
    <select onchange="repPeriod=this.value;vReports()">
      ${[['day','Today'],['week','This week'],['month','This month'],['year','This year'],['all','All time']].map(([v,l])=>`<option value="${v}" ${repPeriod===v?'selected':''}>${l}</option>`).join('')}
    </select>
    <select onchange="repTaxi=this.value;vReports()">
      <option value="all" ${repTaxi==='all'?'selected':''}>All taxis</option>
      ${db.taxis.map(t=>`<option value="${t.id}" ${repTaxi===t.id?'selected':''}>${t.plate}</option>`).join('')}
    </select>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="lbl">Income</div><div class="val green" style="font-size:21px">${money(totIn)}</div></div>
    <div class="stat"><div class="lbl">Expenses</div><div class="val red" style="font-size:21px">${money(totEx)}</div></div>
  </div>
  <div class="stat"><div class="lbl">Net profit</div><div class="val ${totIn-totEx>=0?'green':'red'}">${money(totIn-totEx)}</div></div>`;
  h+=`<div class="divlabel">Expenses by category</div><div class="card">`;
  if(!catArr.length)h+=`<div class="sub" style="margin:0">No expenses in this period.</div>`;
  catArr.forEach(([c,v])=>{h+=`<div style="margin-bottom:12px">
    <div class="row" style="margin-bottom:4px"><div class="sub" style="margin:0;color:var(--ink);font-weight:700">${c}</div><div class="money out">${money(v)}</div></div>
    <div class="barwrap"><div class="bar"><span style="width:${(v/maxCat*100).toFixed(0)}%;background:${CAT_COLOR[c]||'#888'}"></span></div></div>
    <div class="sub" style="margin-top:3px">${(v/totEx*100).toFixed(1)}% of expenses</div></div>`;});
  h+=`</div>`;
  // Per-taxi comparison (only when viewing all taxis and more than one exists)
  if(repTaxi==='all'&&db.taxis.length>1){
    h+=`<div class="divlabel">By taxi — ${periodLabel().toLowerCase()}</div><div class="card"><table class="rep">
      <tr><td style="font-weight:800">Taxi</td><td style="text-align:right;font-weight:800">In</td><td style="text-align:right;font-weight:800">Out</td><td style="text-align:right;font-weight:800">Net</td></tr>`;
    db.taxis.map(t=>{const d=plData(t.id);return{plate:t.plate,totIn:d.totIn,totEx:d.totEx,net:d.net};})
      .sort((a,b)=>b.net-a.net)
      .forEach(r=>{h+=`<tr><td>${r.plate}</td><td style="text-align:right;color:var(--green)">${money(r.totIn)}</td><td style="text-align:right;color:var(--red)">${money(r.totEx)}</td><td style="text-align:right;font-weight:800;color:${r.net>=0?'var(--green)':'var(--red)'}">${money(r.net)}</td></tr>`;});
    h+=`</table></div>`;
  }
  h+=`<div class="divlabel">Generate</div>
    <button class="btn dark" onclick="printPL()">📑 Monthly P&L statement (PDF)</button>
    <div style="height:10px"></div>
    <button class="btn dark" onclick="printFleetPL()">📊 Fleet comparison — all taxis (PDF)</button>
    <div style="height:10px"></div>
    <button class="btn dark" onclick="printReport()">📄 Full report / Save as PDF</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="exportCSV()">⬇︎ Export records to CSV</button>
    <div class="hint">The P&L statement is a clean profit-and-loss summary per taxi. Pick one taxi above for an individual statement, or “All taxis” for the whole fleet. On the print screen choose “Save as PDF” to keep or email it.</div>`;
  document.getElementById('view').innerHTML=h;
}
function periodLabel(){return ({day:'Today',week:'This week',month:'This month',year:'This year',all:'All time'})[repPeriod];}
function plData(tid){
  const f=r=>within(r.date,repPeriod)&&(tid==='all'||r.taxi===tid);
  const inc=db.income.filter(f), exp=db.expenses.filter(f), prt=db.parts.filter(f);
  const incomeLines=[];
  const incBy={};inc.forEach(r=>{const k=r.note&&r.note.length<40?r.note:'Takings';incBy[k]=(incBy[k]||0)+ +r.amount;});
  // keep income simple: one total line if many notes
  const totIn=inc.reduce((s,r)=>s+ +r.amount,0);
  // expense lines: each part by its part-name, plus expense categories
  const expLines={};
  prt.forEach(r=>{const k=(r.part==='Other'&&r.note)?r.note.split('—')[0].trim().slice(0,38):r.part;expLines[k]=(expLines[k]||0)+ +r.amount;});
  exp.forEach(r=>{expLines[r.category]=(expLines[r.category]||0)+ +r.amount;});
  const totEx=totSum(expLines);
  return {totIn,inc,expLines,totEx,net:totIn-totEx};
}
function totSum(o){return Object.values(o).reduce((s,v)=>s+v,0);}

    .net td{background:#0F1A2B;color:#fff;font-weight:800;font-size:17px}

  </style></head><body>
  <div class="head"><h1>Profit &amp; Loss — ${scope}</h1></div>

    ${incRows}
    <tr class="tot"><td>Total income</td><td class="amt g">${money(d.totIn)}</td></tr>

    <tr class="tot"><td>Total expenses</td><td class="amt r">(${money(d.totEx)})</td></tr>

function printFleetPL(){

    <tr class="tot"><td>Fleet total</td><td class="g">${money(sumIn)}</td><td class="r">(${money(sumEx)})</td><td class="${sumNet>=0?'g':'r'}">${money(sumNet)}</td></tr>
  </table>
  <p style="color:#9aa3b2;font-size:11px;margin-top:26px">Generated by Fleetbook. Figures reflect records entered for this period.</p>

function printReport(){
  const inc=db.income.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi));
  const expRaw=db.expenses.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi));
  const prt=db.parts.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi));

  const totIn=inc.reduce((s,r)=>s+ +r.amount,0),totEx=exp.reduce((s,r)=>s+ +r.amount,0);
  const byCat={};exp.forEach(r=>byCat[r.category]=(byCat[r.category]||0)+ +r.amount);

  let w=window.open('','_blank');

    .box b{display:block;font-size:20px;margin-top:4px}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:24px}

  <div class="meta">${periodLabel()} · ${scope} · generated ${new Date().toLocaleString()}</div>
  <div class="sum">
    <div class="box">Income<b class="g">${money(totIn)}</b></div>
    <div class="box">Expenses<b class="r">${money(totEx)}</b></div>

  <h3>Income records (${inc.length})</h3>
  <table><tr><th>Date</th><th>Taxi</th><th>Cat</th><th>Note</th><th style="text-align:right">Amount</th></tr>${rows(inc)||'<tr><td colspan=5>None</td></tr>'}</table>
  <h3>Expense records (${exp.length})</h3>

  </body></html>`);

}
function exportCSV(){
  let lines=['Type,Date,Taxi,Category,Note,Amount'];
  db.income.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi))
    .forEach(r=>lines.push(`Income,${r.date},"${taxiName(r.taxi)}",,"${(r.note||'').replace(/"/g,'""')}",${r.amount}`));
  db.expenses.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi))
    .forEach(r=>lines.push(`Expense,${r.date},"${taxiName(r.taxi)}",${r.category},"${(r.note||'').replace(/"/g,'""')}",${r.amount}`));
  db.parts.filter(r=>within(r.date,repPeriod)&&(repTaxi==='all'||r.taxi===repTaxi))
    .forEach(r=>lines.push(`Part,${r.date},"${taxiName(r.taxi)}",${r.part}${r.qty>1?' x'+r.qty:''},"${(r.note||'').replace(/"/g,'""')}",${r.amount}`));
  dl('fleetbook-records.csv',lines.join('\n'),'text/csv');
}

/* ---------- Backup ---------- */
async function backup(){
  const name='fleetbook-backup-'+today()+'.json';
  const content=JSON.stringify(db);
  const file=new File([content],name,{type:'application/json'});
  // Prefer the native share sheet so "Save to Files / iCloud Drive" and email appear
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file],title:'Fleetbook backup'});
      localStorage.setItem('fb_lastBackup',Date.now());localStorage.setItem('fb_changesSinceBackup',0);_backupPromptShown=false;
      toast('Backup saved');if(TAB==='dash')render();
      return;
    }catch(e){ if(e&&e.name==='AbortError'){return;} /* fall through to download */ }
  }
  dl(name,content,'application/json');
  localStorage.setItem('fb_lastBackup',Date.now());localStorage.setItem('fb_changesSinceBackup',0);_backupPromptShown=false;
  toast('Backup downloaded');if(TAB==='dash')render();
}
function restore(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);if(!d.taxis)throw 0;
    if(confirm('Replace all current data with this backup?')){db=Object.assign({},blank,d);save();localStorage.setItem('fb_lastBackup',Date.now());localStorage.setItem('fb_changesSinceBackup',0);_backupPromptShown=false;render();toast('Backup restored');}}
    catch(e){toast('Invalid backup file');}};rd.readAsText(f);}
function dl(name,content,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

/* ---------- Sheet ---------- */
function openSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('scrim').classList.add('show');}
function closeSheet(){document.getElementById('scrim').classList.remove('show');pendingReceipt=null;pendingContract=null;pendingContractName='';pendingPartReceipt=null;pendingIncPhotos=[];}
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeSheet();});

bootStorage().then(render).catch(render);
